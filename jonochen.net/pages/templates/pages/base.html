{% load static %}

<head>
    <title>Jonathan Chen</title>
    <link type="text/css" href="{% static 'pages/home.css' %}" rel="stylesheet">
    <link type="text/css" rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
</head>

<body>
    <header class="site-header">
        <div class="header-logo">
            <a href="/" class="header-home-link {% if current_page == 'home' %}active{% endif %}">
                <img src="{% static 'pages/jono.svg' %}" alt="logo" style="height:55px; width:auto; filter:invert(1);">
                <span class="header-name">Jonathan Chen</span>
            </a>
        </div>
        <nav class="header-nav">
            <a href="/about" class="nav-tab {% if current_page == 'about' %}active{% endif %}" hx-get="/about" hx-target="#main-content" hx-push-url="true">about</a>
            <a href="/projects" class="nav-tab {% if current_page == 'projects' %}active{% endif %}" hx-get="/projects" hx-target="#main-content" hx-push-url="true">projects</a>
        </nav>
    </header>
    <div id="main-content" class="my-container">
        {% include partial %}
    </div>
    <footer class="site-footer">
        <div class="icon-list">
            <a class="icon" href="https://www.linkedin.com/in/jonathanchenq/"> <i class="fa-brands fa-linkedin"></i> <div class="icon-sub">LinkedIn</div></a>
            <a class="icon" href="https://github.com/04jono"> <i class="fa-brands fa-github"></i> <div class="icon-sub">GitHub</div></a>
            <a class="icon" href="/resume"> <i class="fa-solid fa-file-lines"></i> <div class="icon-sub">Resume</div></a>
        </div>
    </footer>
<script>
    function updateActiveTab() {
        const path = window.location.pathname;
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.classList.toggle('active', tab.getAttribute('href') === path);
        });
        const homeLink = document.querySelector('.header-home-link');
        if (homeLink) {
            homeLink.classList.toggle('active', path === '/');
        }
    }
    document.addEventListener('htmx:afterSettle', updateActiveTab);
</script>
</body>
